global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'lstm-dashboard-monitor'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  # - "first_rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'lstm-dashboard'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['localhost:8501']
    scrape_interval: 10s
    scrape_timeout: 5s

  - job_name: 'lstm-dashboard-alt'
    metrics_path: '/_stcore/metrics'
    static_configs:
      - targets: ['localhost:8501']
    scrape_interval: 10s
